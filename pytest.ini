[pytest]
# ---------------------------------------------------------------------------
# pytest configuration for Conduit Control Center
# Issue #36 (unit tests), Issue #37 (integration tests)
# ---------------------------------------------------------------------------

# Discover tests under tests/
testpaths = tests

# pytest-asyncio: treat all async test functions as asyncio tests automatically.
# This removes the need for @pytest.mark.asyncio on every async test.
asyncio_mode = auto

# Suppress the asyncio fixture loop scope deprecation warning introduced in
# pytest-asyncio 0.23. Each fixture runs in a fresh per-function event loop.
asyncio_default_fixture_loop_scope = function

# Short tracebacks keep CI output readable.
addopts = --tb=short -q
