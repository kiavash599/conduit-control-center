<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 600" role="img" aria-label="Conduit Control Center — brand master">
  <title>Conduit Control Center — brand master (source of truth)</title>
  <desc>Layered master: all approved logo variants as named symbols plus the dual-role palette. Teal = brand/mark identity; Indigo = UI/action accent and is never used in the logo. Wordmark is neutral (theme text).</desc>

  <defs>
    <!-- Full mark: 1 hub + 6 nodes. currentColor so each placement sets its own colour. -->
    <symbol id="mark48" viewBox="0 0 48 48">
      <g fill="currentColor" stroke="currentColor" stroke-linecap="round">
        <g stroke-width="2.5" fill="none">
          <line x1="24" y1="24" x2="37.86" y2="16"/>
          <line x1="24" y1="24" x2="24"    y2="8"/>
          <line x1="24" y1="24" x2="10.14" y2="16"/>
          <line x1="24" y1="24" x2="10.14" y2="32"/>
          <line x1="24" y1="24" x2="24"    y2="40"/>
          <line x1="24" y1="24" x2="37.86" y2="32"/>
        </g>
        <circle cx="37.86" cy="16" r="3.5"/>
        <circle cx="24"    cy="8"  r="3.5"/>
        <circle cx="10.14" cy="16" r="3.5"/>
        <circle cx="10.14" cy="32" r="3.5"/>
        <circle cx="24"    cy="40" r="3.5"/>
        <circle cx="37.86" cy="32" r="3.5"/>
        <circle cx="24" cy="24" r="5.5"/>
      </g>
    </symbol>

    <!-- Simplified mark: 1 hub + 3 nodes, thick strokes. -->
    <symbol id="markSimplified" viewBox="0 0 32 32">
      <g fill="currentColor" stroke="currentColor" stroke-linecap="round">
        <g stroke-width="4" fill="none">
          <line x1="16" y1="16" x2="16"    y2="6"/>
          <line x1="16" y1="16" x2="7.34"  y2="21"/>
          <line x1="16" y1="16" x2="24.66" y2="21"/>
        </g>
        <circle cx="16"    cy="6"  r="3"/>
        <circle cx="7.34"  cy="21" r="3"/>
        <circle cx="24.66" cy="21" r="3"/>
        <circle cx="16" cy="16" r="4.5"/>
      </g>
    </symbol>
  </defs>

  <style>
    .lbl { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; fill: #475569; }
    .hd  { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #0F172A; }
  </style>

  <text class="hd" x="20" y="30">Conduit Control Center — brand master</text>

  <!-- Row 1: full / simplified / mono -->
  <text class="lbl" x="20"  y="58">Full mark (teal) · ≥48px</text>
  <use href="#mark48" x="20" y="66" width="96" height="96" color="#0D9488"/>

  <text class="lbl" x="160" y="58">Simplified · ≤32px</text>
  <use href="#markSimplified" x="160" y="66" width="96" height="96" color="#0D9488"/>

  <text class="lbl" x="300" y="58">Monochrome (white on ink)</text>
  <rect x="300" y="66" width="96" height="96" rx="8" fill="#0F172A"/>
  <use href="#mark48" x="300" y="66" width="96" height="96" color="#FFFFFF"/>

  <!-- Row 2: lockup -->
  <text class="lbl" x="20" y="200">Horizontal lockup (mark teal · wordmark neutral)</text>
  <g transform="translate(20,210)">
    <use href="#mark48" x="0" y="0" width="48" height="48" color="#0D9488"/>
    <text x="60" y="24" dominant-baseline="central"
          font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" letter-spacing="-0.2" fill="#0F172A">Conduit Control Center</text>
  </g>

  <!-- Row 3: avatar / maskable -->
  <text class="lbl" x="20" y="300">Avatar (full-bleed · Deep Ink)</text>
  <rect x="20" y="308" width="110" height="110" rx="10" fill="#0F172A"/>
  <use href="#mark48" x="42" y="330" width="66" height="66" color="#2DD4BF"/>

  <text class="lbl" x="160" y="300">Maskable (80% safe zone)</text>
  <rect x="160" y="308" width="110" height="110" rx="10" fill="#0F172A"/>
  <circle cx="215" cy="363" r="44" fill="none" stroke="#334155" stroke-dasharray="3 3"/>
  <use href="#mark48" x="182" y="330" width="66" height="66" color="#2DD4BF"/>

  <!-- Palette / dual-role contract -->
  <text class="hd" x="20" y="470">Dual-role palette</text>
  <rect x="20"  y="482" width="60" height="40" rx="6" fill="#0D9488"/>
  <text class="lbl" x="20" y="538">Teal-600</text>
  <text class="lbl" x="20" y="552">#0D9488 · mark (light)</text>

  <rect x="100" y="482" width="60" height="40" rx="6" fill="#2DD4BF"/>
  <text class="lbl" x="100" y="538">Teal-400</text>
  <text class="lbl" x="100" y="552">#2DD4BF · mark (dark)</text>

  <rect x="180" y="482" width="60" height="40" rx="6" fill="#0F172A"/>
  <text class="lbl" x="180" y="538">Deep Ink</text>
  <text class="lbl" x="180" y="552">#0F172A · avatar bg</text>

  <rect x="260" y="482" width="60" height="40" rx="6" fill="#4F46E5"/>
  <text class="lbl" x="260" y="538">Indigo-600</text>
  <text class="lbl" x="260" y="552">#4F46E5 · UI only</text>

  <text class="lbl" x="20" y="582">Contract: the mark is teal-only; indigo is reserved for UI controls and never appears in the logo.</text>
</svg>
