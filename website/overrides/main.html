{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <link rel="stylesheet" href="{{ 'assets/stylesheets/extra.css' | url }}">
{% endblock %}

{% block content %}
  {% if page and page.url.startswith('fa/') %}
    <div class="ccc-rtl" dir="rtl" lang="fa">{{ super() }}</div>
  {% else %}
    {{ super() }}
  {% endif %}
{% endblock %}
