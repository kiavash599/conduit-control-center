{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <link rel="stylesheet" href="{{ 'assets/stylesheets/extra.css' | url }}">
  <script>
    (function () {
      if (!location.pathname.split('/').includes('fa')) return;
      var html = document.documentElement;
      html.setAttribute('dir', 'rtl');
      html.classList.add('ccc-fa');
      var setBody = function () { if (document.body) document.body.setAttribute('dir', 'rtl'); };
      if (document.body) { setBody(); }
      else { document.addEventListener('DOMContentLoaded', setBody); }
    })();
  </script>
{% endblock %}
