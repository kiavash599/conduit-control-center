name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: "PRE-TAG gate: full 40-hex commit SHA of the release candidate to validate"
        required: false
        default: ""

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

      - name: Release preflight (dev mode)
        # Authoritative release-readiness gate in dev mode: validates the committed builder inputs,
        # the durable 30-pin solution, and the 495-tag target artifact with the SAME validators
        # produce_release uses, while allowing the legitimate pre-generation state (the derived
        # six-entry build lock and 24-entry reuse authorization are generated later, pre-tag). Runs on
        # every branch/PR so drift in a committed release input fails CI early.
        run: python -m release.preflight --repo .

      - name: Compile privileged helpers (extension-less)
        # deployment/bin/* helpers have no .py extension, so ruff/pytest skip
        # them. Byte-compile every Python-shebang helper so a syntax error in a
        # privileged updater fails CI (the helpers are not import-tested by the
        # backend coverage run).
        run: |
          status=0
          for f in deployment/bin/*; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -qi 'python'; then
              echo "py_compile $f"
              python -m py_compile "$f" || status=1
            fi
          done
          exit $status

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Prepare .env for tests
        run: |
          cp .env.example .env
          sed -i "s|^SESSION_SECRET=.*|SESSION_SECRET=$(python -c 'import secrets; print(secrets.token_hex(32))')|" .env

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  release-preflight:
    name: Release Preflight (release mode)
    runs-on: ubuntu-22.04
    needs: lint
    # Runs in two DISTINCT roles. Note carefully what each can and cannot guarantee:
    #
    #  1. PRE-TAG gate (workflow_dispatch WITH `candidate_sha`): checks out that EXACT commit,
    #     asserts HEAD == candidate_sha, and runs the release-mode preflight against it. This is the
    #     only CI role that produces evidence bound to a specific release candidate BEFORE a tag
    #     exists. The Owner runs it (or the equivalent local exact-commit preflight) and only tags
    #     after it is green.
    #  2. POST-TAG secondary defense (version-tag push): runs AFTER the tag has already been created
    #     and pushed. It CANNOT prevent an invalid tag from being created -- it can only detect one
    #     that already exists, so the Owner can delete/retract it. It is a backstop, not the gate.
    #
    # A dispatch WITHOUT `candidate_sha` validates whatever ref was selected and is therefore NOT
    # release evidence; it is treated as an exploratory run and says so in its output.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          # For the pre-tag role, check out the explicit candidate commit (empty -> default ref).
          ref: ${{ github.event.inputs.candidate_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Bind this run to the explicit release candidate (pre-tag role)
        id: bind
        run: |
          set -euo pipefail
          CAND="${{ github.event.inputs.candidate_sha }}"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ -n "${CAND}" ]; then
            case "${CAND}" in
              [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]*) : ;;
              *) echo "ERROR: candidate_sha must be a full 40-hex commit SHA" >&2; exit 1;;
            esac
            if [ "${#CAND}" -ne 40 ]; then
              echo "ERROR: candidate_sha must be exactly 40 hex chars (got ${#CAND})" >&2; exit 1
            fi
            if [ "${HEAD_SHA}" != "${CAND}" ]; then
              echo "ERROR: HEAD ${HEAD_SHA} != candidate_sha ${CAND}" >&2; exit 1
            fi
            echo "role=pre-tag gate; evidence bound to commit ${HEAD_SHA}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "role=EXPLORATORY (no candidate_sha supplied); NOT release evidence. HEAD=${HEAD_SHA}"
          else
            echo "role=POST-TAG secondary defense for ${{ github.ref }}; this CANNOT prevent tag"
            echo "creation -- it only detects an already-created invalid tag. HEAD=${HEAD_SHA}"
          fi

      - name: Release preflight (require full release-ready input set)
        run: python -m release.preflight --repo . --require-present

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check install script syntax
        run: |
          if [ -f install.sh ]; then
            bash -n install.sh
            shellcheck install.sh
          else
            echo "install.sh not yet created — skipping"
          fi

      - name: Check uninstall script syntax
        run: |
          if [ -f uninstall.sh ]; then
            bash -n uninstall.sh
            shellcheck uninstall.sh
          else
            echo "uninstall.sh not yet created — skipping"
          fi

      - name: Check update script syntax
        run: |
          if [ -f update.sh ]; then
            bash -n update.sh
            shellcheck update.sh
          else
            echo "update.sh not yet created — skipping"
          fi

      - name: Check first-transition bootstrap syntax
        run: |
          bash -n deployment/bootstrap/ccc-bootstrap.sh
          shellcheck deployment/bootstrap/ccc-bootstrap.sh

      - name: Check scripts directory
        run: |
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            bash -n "$f"
            shellcheck "$f"
          done

  # Epic-1/2 A7: THE cumulative invariant gate. Runs the SAME committed entry
  # point the v0.3.19 qualification runbook uses. Full unweakened Linux
  # discovery + conftest + bash/ShellCheck gates + the required-invariant
  # inventory (deletion guard). Only this entry point may claim
  # INVARIANT_SUITE=PASS.
  invariant-suite:
    name: Invariant suite (authoritative Linux gate)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck rsync
      - name: Run the cumulative invariant suite
        run: python -m tests.invariant_suite --platform linux -q
