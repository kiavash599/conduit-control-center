name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

      - name: Compile privileged helpers (extension-less)
        # deployment/bin/* helpers have no .py extension, so ruff/pytest skip
        # them. Byte-compile every Python-shebang helper so a syntax error in a
        # privileged updater fails CI (the helpers are not import-tested by the
        # backend coverage run).
        run: |
          status=0
          for f in deployment/bin/*; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -qi 'python'; then
              echo "py_compile $f"
              python -m py_compile "$f" || status=1
            fi
          done
          exit $status

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Prepare .env for tests
        run: |
          cp .env.example .env
          sed -i "s|^SESSION_SECRET=.*|SESSION_SECRET=$(python -c 'import secrets; print(secrets.token_hex(32))')|" .env

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check install script syntax
        run: |
          if [ -f install.sh ]; then
            bash -n install.sh
            shellcheck install.sh
          else
            echo "install.sh not yet created — skipping"
          fi

      - name: Check uninstall script syntax
        run: |
          if [ -f uninstall.sh ]; then
            bash -n uninstall.sh
            shellcheck uninstall.sh
          else
            echo "uninstall.sh not yet created — skipping"
          fi

      - name: Check update script syntax
        run: |
          if [ -f update.sh ]; then
            bash -n update.sh
            shellcheck update.sh
          else
            echo "update.sh not yet created — skipping"
          fi

      - name: Check scripts directory
        run: |
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            bash -n "$f"
            shellcheck "$f"
          done
