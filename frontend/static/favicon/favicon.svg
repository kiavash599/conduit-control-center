<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Conduit Control Center">
  <title>Conduit Control Center</title>
  <desc>Theme-aware favicon (simplified 3-node mark). Teal-600 on light tab bars, Teal-400 on dark tab bars via prefers-color-scheme.</desc>
  <style>
    :root { color: #0D9488; }
    @media (prefers-color-scheme: dark) { :root { color: #2DD4BF; } }
  </style>
  <g fill="currentColor" stroke="currentColor" stroke-linecap="round">
    <g stroke-width="4" fill="none">
      <line x1="16" y1="16" x2="16"    y2="6"/>
      <line x1="16" y1="16" x2="7.34"  y2="21"/>
      <line x1="16" y1="16" x2="24.66" y2="21"/>
    </g>
    <circle cx="16"    cy="6"  r="3"/>
    <circle cx="7.34"  cy="21" r="3"/>
    <circle cx="24.66" cy="21" r="3"/>
    <circle cx="16" cy="16" r="4.5"/>
  </g>
</svg>
