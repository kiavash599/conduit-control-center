<!DOCTYPE html>
<!--
  frontend/templates/base.html
  -----------------------------
  Jinja2 base template for Conduit Control Center.
  Implemented in Issue #26.

  All page templates extend this file.

  Blocks
  ------
  title       : text inserted into <title>...</title>
                Default: "Conduit Control Center"
  head_extra  : additional <link>, <meta>, or <style> tags in <head>
                Default: empty
  body_class  : CSS class(es) for <body>
                Default: empty
  body        : full page body content
                Required — child templates must fill this block.
  scripts     : page-specific <script> tags loaded after api.js and app.js
                Default: empty

  Usage
  -----
  {% raw %}{% extends "base.html" %}
  {% block title %}Sign in — Conduit Control Center{% endblock %}
  {% block body %}
    ... page content ...
  {% endblock %}{% endraw %}
-->
<html lang="en" data-theme="{{ theme | default('dark', true) }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Conduit Control Center{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_url('css/base.css') }}">

    <!-- Favicons & app icons (Branding B3).
         Fallback chain: .ico for legacy/Safari; theme-aware .svg for modern
         browsers (Chrome/Firefox/Edge pick this); explicit PNG fallbacks; an
         apple-touch-icon for iOS home screens; the web app manifest for
         installability. All URLs are cache-busted via static_url(). -->
    <link rel="icon" href="{{ static_url('favicon/favicon.ico') }}" sizes="32x32">
    <link rel="icon" type="image/svg+xml" href="{{ static_url('favicon/favicon.svg') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ static_url('favicon/favicon-32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ static_url('favicon/favicon-16.png') }}">
    <link rel="apple-touch-icon" href="{{ static_url('icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ static_url('site.webmanifest') }}">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    {% block head_extra %}{% endblock %}
</head>
{%- set _body_class %}{% block body_class %}{% endblock %}{% endset -%}
<body{% if _body_class %} class="{{ _body_class }}"{% endif %}>

{% block body %}{% endblock %}

<!--
  api.js is loaded on every page:
    - Toast system (used by both login error recovery and dashboard polling errors)
    - apiFetch wrapper (used by dashboard; available on login page for fallback uses)
  app.js is loaded on every page:
    - startPolling / stopPolling (only active on dashboard, harmless elsewhere)
    - onReady helper

  Script loading order is fixed: api.js → app.js → page-specific scripts.
  No module system; globals are exposed on window.
-->
<script src="{{ static_url('js/api.js') }}"></script>
<script src="{{ static_url('js/app.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
