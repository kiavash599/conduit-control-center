<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Conduit Control Center mark (monochrome)">
  <title>Conduit Control Center — monochrome mark</title>
  <desc>Single-colour version. Uses currentColor so it renders pure black or pure white. The shape reads from geometry alone (larger hub, six smaller nodes, connecting spokes) without relying on colour.</desc>
  <g fill="currentColor" stroke="currentColor" stroke-linecap="round" color="#0F172A">
    <g stroke-width="2.5" fill="none">
      <line x1="24" y1="24" x2="37.86" y2="16"/>
      <line x1="24" y1="24" x2="24"    y2="8"/>
      <line x1="24" y1="24" x2="10.14" y2="16"/>
      <line x1="24" y1="24" x2="10.14" y2="32"/>
      <line x1="24" y1="24" x2="24"    y2="40"/>
      <line x1="24" y1="24" x2="37.86" y2="32"/>
    </g>
    <circle cx="37.86" cy="16" r="3.5"/>
    <circle cx="24"    cy="8"  r="3.5"/>
    <circle cx="10.14" cy="16" r="3.5"/>
    <circle cx="10.14" cy="32" r="3.5"/>
    <circle cx="24"    cy="40" r="3.5"/>
    <circle cx="37.86" cy="32" r="3.5"/>
    <circle cx="24" cy="24" r="5.5"/>
  </g>
</svg>
