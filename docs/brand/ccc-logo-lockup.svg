<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 48" role="img" aria-label="Conduit Control Center">
  <title>Conduit Control Center — horizontal lockup</title>
  <desc>Mark (teal) plus wordmark. Wordmark uses currentColor so it adapts to the theme text colour. Clear space between mark and wordmark equals the wordmark cap height. Live text shown for review; convert to outlines on export (B2).</desc>
  <!-- mark (teal), occupying the 0-48 box -->
  <g fill="#0D9488" stroke="#0D9488" stroke-linecap="round">
    <g stroke-width="2.5" fill="none">
      <line x1="24" y1="24" x2="37.86" y2="16"/>
      <line x1="24" y1="24" x2="24"    y2="8"/>
      <line x1="24" y1="24" x2="10.14" y2="16"/>
      <line x1="24" y1="24" x2="10.14" y2="32"/>
      <line x1="24" y1="24" x2="24"    y2="40"/>
      <line x1="24" y1="24" x2="37.86" y2="32"/>
    </g>
    <circle cx="37.86" cy="16" r="3.5"/>
    <circle cx="24"    cy="8"  r="3.5"/>
    <circle cx="10.14" cy="16" r="3.5"/>
    <circle cx="10.14" cy="32" r="3.5"/>
    <circle cx="24"    cy="40" r="3.5"/>
    <circle cx="37.86" cy="32" r="3.5"/>
    <circle cx="24" cy="24" r="5.5"/>
  </g>
  <!-- wordmark (neutral, theme-adaptive via currentColor) -->
  <text x="60" y="24" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="600" letter-spacing="-0.2"
        fill="currentColor" color="#0F172A">Conduit Control Center</text>
</svg>
