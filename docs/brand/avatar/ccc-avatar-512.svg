<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Conduit Control Center avatar">
  <title>Conduit Control Center — avatar (full-bleed)</title>
  <desc>Full-bleed square for GitHub/social. Deep Ink background (#0F172A); Teal-400 mark for contrast on dark. Mark detail sits inside the centred circular safe zone so a circular crop never clips it.</desc>
  <!-- full-bleed background -->
  <rect x="0" y="0" width="512" height="512" fill="#0F172A"/>
  <!-- optional reference safe circle (not rendered): r=205 at centre -->
  <!-- mark: 48-unit art scaled 5.8x, centred at 256,256 -->
  <g transform="translate(116.8,116.8) scale(5.8)"
     fill="#2DD4BF" stroke="#2DD4BF" stroke-linecap="round">
    <g stroke-width="2.5" fill="none">
      <line x1="24" y1="24" x2="37.86" y2="16"/>
      <line x1="24" y1="24" x2="24"    y2="8"/>
      <line x1="24" y1="24" x2="10.14" y2="16"/>
      <line x1="24" y1="24" x2="10.14" y2="32"/>
      <line x1="24" y1="24" x2="24"    y2="40"/>
      <line x1="24" y1="24" x2="37.86" y2="32"/>
    </g>
    <circle cx="37.86" cy="16" r="3.5"/>
    <circle cx="24"    cy="8"  r="3.5"/>
    <circle cx="10.14" cy="16" r="3.5"/>
    <circle cx="10.14" cy="32" r="3.5"/>
    <circle cx="24"    cy="40" r="3.5"/>
    <circle cx="37.86" cy="32" r="3.5"/>
    <circle cx="24" cy="24" r="5.5"/>
  </g>
</svg>
