<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Conduit Control Center mark (compact)">
  <title>Conduit Control Center — simplified mark</title>
  <desc>Reduced hub-and-spoke: one hub with three outer nodes and thick strokes. For favicons and use at 32px and below.</desc>
  <g fill="#0D9488" stroke="#0D9488" stroke-linecap="round">
    <!-- spokes (hub -> 3 nodes) -->
    <g stroke-width="4" fill="none">
      <line x1="16" y1="16" x2="16"    y2="6"/>
      <line x1="16" y1="16" x2="7.34"  y2="21"/>
      <line x1="16" y1="16" x2="24.66" y2="21"/>
    </g>
    <!-- outer nodes -->
    <circle cx="16"    cy="6"  r="3"/>
    <circle cx="7.34"  cy="21" r="3"/>
    <circle cx="24.66" cy="21" r="3"/>
    <!-- hub -->
    <circle cx="16" cy="16" r="4.5"/>
  </g>
</svg>
